<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visao 360 - Solicitar Acesso</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128202;</text></svg>">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>Solicitar Acesso</h1>
        <p class="subtitle">Seu cadastro sera aprovado pelo administrador da plataforma</p>

        <div id="alert" class="alert" style="display:none;"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="name" required placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Email corporativo</label>
                <input type="email" id="email" required placeholder="seu@empresa.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required minlength="6" placeholder="Minimo 6 caracteres">
            </div>
            <button type="submit" class="btn btn-primary" id="btnRegister">Solicitar Acesso</button>
        </form>

        <div class="link">
            Ja tem conta? <a href="/">Fazer login</a>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('btnRegister');
    alertEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            }),
        });
        const data = await res.json();
        if (res.ok) {
            alertEl.className = 'alert alert-success';
            alertEl.textContent = data.message;
            alertEl.style.display = 'block';
            document.getElementById('registerForm').reset();
        } else {
            alertEl.className = 'alert alert-error';
            alertEl.textContent = data.detail || 'Erro no registro';
            alertEl.style.display = 'block';
        }
    } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = 'Erro de conexao';
        alertEl.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Solicitar Acesso';
});
</script>
</body>
</html>
